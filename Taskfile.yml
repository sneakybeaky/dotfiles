# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GREETING: Hello, world!
  USERNAME:
    sh: whoami
  HOSTNAME:
    sh: hostname

tasks:
  default:
    desc: List all tasks
    cmds:
      - task -l
    silent: true

  build:
    desc: Build Nix configuration
    cmds:
      - home-manager build --flake .#{{.USERNAME}}@{{.HOSTNAME}} -b backup

  apply:
    desc: Apply Nix configuration
    cmds:
      - home-manager switch --flake .#{{.USERNAME}}@{{.HOSTNAME}} -b backup

  update:
    desc: Update packages
    cmds:
      - nix flake update
      - task: apply
      - task: changed

  changed:
    desc: Show what changed with last update
    cmds:
      - home-manager generations | head -n 2 | cut -d' ' -f 7 | tail -r | xargs   nix store diff-closures

  cache-check:
    desc: Show which packages in the home config are missing from binary caches
    cmds:
      - home-manager build --flake .#{{.USERNAME}}@{{.HOSTNAME}}
      - nix run .#nix-cache-check -- -r -missing ./result

  cache-check-unstable:
    desc: "Check if an unstable package is in a binary cache, e.g. `task cache-check-unstable -- mise`"
    vars:
      PKG_PATH:
        sh: nix eval --raw --impure --expr 'let f = builtins.getFlake (toString ./.); in (import f.inputs.nixpkgs-unstable { system = builtins.currentSystem; config.allowUnfree = true; }).{{.CLI_ARGS}}.outPath'
    cmds:
      - printf '%s\n' "{{.PKG_PATH}}" | nix run .#nix-cache-check --
